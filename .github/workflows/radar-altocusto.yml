name: Radar Alto Custo

on:
  schedule:
    # Roda 6x por dia (horário UTC) = 8:30, 10:30, 12:30, 14:30, 16:30, 18:30 Brasília
    - cron: '30 11,13,15,17,19,21 * * *'
  workflow_dispatch:  # permite rodar manualmente

jobs:
  radar_altocusto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: pip install requests

      - name: Executar Radar Alto Custo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_ALTOCUSTO: ${{ secrets.TELEGRAM_CHAT_ID_ALTOCUSTO }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python LICITACAO_ALTOCUSTO.py
